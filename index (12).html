<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Profile App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at 50% 50%, #4a2505 0%, #12090b 50%, #0a060a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Top Left Planet SVG Container */
        .planet-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 4.5rem;
            height: 4.5rem;
        }

        /* Shorts Carousel */
        .stories-carousel {
            width: min(92vw, 820px);
            border: 1px solid rgba(255, 177, 0, 0.25);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1rem 2.6rem;
            position: relative;
            margin-bottom: 2.5rem;
            z-index: 10;
            overflow: hidden;
            display: none; /* Hidden by default */
        }
        .stories-carousel.visible {
            display: block;
        }

        .admin-controls {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 100;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid #ffb100;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }

        .stories-track {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .stories-track::-webkit-scrollbar {
            display: none;
        }

        .story-card {
            flex: 0 0 130px;
            width: 130px;
            height: 230px;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 177, 0, 0.15);
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .story-card iframe {
            width: 100%;
            height: 100%;
            border: 0;
            pointer-events: none;
        }

        .story-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0.08) 40%, rgba(0,0,0,0.2));
            pointer-events: none;
        }

        .story-label {
            position: absolute;
            left: 0.55rem;
            right: 0.55rem;
            bottom: 0.6rem;
            font-size: 0.65rem;
            font-weight: 600;
            color: rgba(255,255,255,0.95);
            line-height: 1.25;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #151515;
            border: 1px solid rgba(255, 177, 0, 0.3);
            color: #ffb100;
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .nav-arrow:hover { background: #222; }
        .nav-arrow.left { left: -1.1rem; }
        .nav-arrow.right { right: -1.1rem; }

        /* Profile */
        .profile-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .profile-img {
            width: 18rem;
            height: 18rem;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffb100;
            box-shadow: 0 0 30px rgba(255, 177, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .status-dot {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            width: 1.5rem;
            height: 1.5rem;
            background-color: #00d98f;
            border-radius: 50%;
            border: 3px solid #1a110a;
        }

        /* Title */
        .main-title {
            color: #ffb100;
            font-weight: 900;
            font-size: 4rem;
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(255, 177, 0, 0.4);
            margin: 0 0 2rem 0;
            line-height: 1;
        }

        /* Buttons */
        .action-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 177, 0, 0.4);
            color: white;
            padding: 0.6rem 1.75rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(255, 177, 0, 0.15);
        }
        .action-btn i {
            font-size: 1.1rem;
        }

        /* Corner Buttons */
        .corner-btn {
            position: absolute;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: 1px solid rgba(255, 177, 0, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #ffb100;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.2s;
        }
        .corner-btn:hover {
            background: rgba(255, 177, 0, 0.1);
        }
        .corner-btn.bottom-left {
            bottom: 2rem;
            left: 2.5rem;
        }
        .corner-btn.bottom-right {
            bottom: 2rem;
            right: 2.5rem;
        }

        /* Tool Grid */
        .tool-grid {
            position: absolute;
            bottom: 6.5rem;
            right: 2.5rem;
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.25rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 4rem;
            height: 4rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .tool-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
        }
        .tool-cell:nth-child(1) { border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); color: #eab308; } /* shieldish */
        .tool-cell:nth-child(2) { border-bottom: 1px solid rgba(255,255,255,0.05); color: #a855f7; } /* feather */
        .tool-cell:nth-child(3) { border-right: 1px solid rgba(255,255,255,0.05); color: #22c55e; } /* whatsapp */
        .tool-cell:nth-child(4) { color: #f97316; } /* java */
        
        /* shield custom look */
        .shield-icon {
            position: relative;
        }
        .shield-icon::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -4px;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 2px;
            z-index: -1;
        }
        /* Theme Menu */
        .theme-menu {
            position: absolute;
            bottom: 6.5rem;
            left: 2.5rem;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 177, 0, 0.3);
            border-radius: 1rem;
            padding: 0.75rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(10px);
            z-index: 50;
        }
        .theme-menu.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .color-option {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-option:hover {
            transform: scale(1.1);
        }
    </style>
    <script>
        let videos = JSON.parse(localStorage.getItem('userVideos')) || [];

        function toggleThemes(event) {
            if (event) event.stopPropagation();
            document.getElementById('themeMenu').classList.toggle('active');
        }

        // Close theme menu and modal when clicking outside
        window.addEventListener('click', (e) => {
            const themeMenu = document.getElementById('themeMenu');
            const colorBtn = document.querySelector('.bottom-left');
            
            if (themeMenu && colorBtn) {
                if (!themeMenu.contains(e.target) && !colorBtn.contains(e.target)) {
                    themeMenu.classList.remove('active');
                }
            }
            
            const modal = document.getElementById('videoModal');
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        function scrollShorts(direction) {
            const track = document.getElementById('shortsTrack');
            track.scrollBy({ left: direction * 290, behavior: 'smooth' });
        }

        function changeTheme(color, bgGradient) {
            document.documentElement.style.setProperty('--main-color', color);
            document.body.style.background = bgGradient;
            
            const title = document.querySelector('.main-title');
            const profile = document.querySelector('.profile-img');
            title.style.color = color;
            profile.style.borderColor = color;
            document.querySelectorAll('.nav-arrow').forEach(a => {
                a.style.color = color;
                a.style.borderColor = color;
            });
            document.querySelectorAll('.corner-btn, .admin-btn').forEach(b => {
                b.style.color = color;
                b.style.borderColor = color;
            });
            document.querySelectorAll('.action-btn').forEach(b => b.style.borderColor = color);
            document.querySelectorAll('.story-card').forEach(card => card.style.borderColor = color + '33');
            const carousel = document.querySelector('.stories-carousel');
            if(carousel) carousel.style.borderColor = color + '40';
            document.getElementById('themeMenu').style.borderColor = color + '66';
        }

        function toggleVideoModal() {
            document.getElementById('videoModal').classList.toggle('active');
        }

        function addVideo() {
            const url = document.getElementById('videoUrl').value;
            const title = document.getElementById('videoTitle').value;
            
            if(!url) return alert('الرجاء إدخال الرابط');
            
            // Extract video ID for YouTube Shorts
            let videoId = '';
            if(url.includes('shorts/')) {
                videoId = url.split('shorts/')[1].split('?')[0];
            } else if(url.includes('v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else {
                videoId = url.split('/').pop();
            }

            videos.push({ id: videoId, title: title || 'فيديو جديد' });
            localStorage.setItem('userVideos', JSON.stringify(videos));
            renderVideos();
            toggleVideoModal();
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoTitle').value = '';
        }

        function clearVideos() {
            if(confirm('هل أنت متأكد من حذف جميع الفيديوهات؟')) {
                videos = [];
                localStorage.removeItem('userVideos');
                renderVideos();
            }
        }

        function renderVideos() {
            const track = document.getElementById('shortsTrack');
            const carousel = document.querySelector('.stories-carousel');
            
            if(videos.length === 0) {
                carousel.classList.remove('visible');
                return;
            }

            carousel.classList.add('visible');
            track.innerHTML = videos.map(v => `
                <a class="story-card" href="https://www.youtube.com/shorts/${v.id}" target="_blank" rel="noopener noreferrer">
                    <iframe src="https://www.youtube.com/embed/${v.id}?controls=0&modestbranding=1&rel=0" title="${v.title}" allowfullscreen></iframe>
                    <div class="story-overlay"></div>
                    <div class="story-label">${v.title}</div>
                </a>
            `).join('');
        }

        window.onload = renderVideos;
    </script>
</head>
<body>

    <!-- Admin Controls -->
    <div class="admin-controls">
        <button class="corner-btn !static" onclick="toggleVideoModal()" title="إضافة فيديو">
            <i class="fas fa-plus"></i>
        </button>
        <button class="corner-btn !static" onclick="clearVideos()" title="مسح الكل">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content text-right" dir="rtl">
            <h2 class="text-xl font-bold mb-4 text-[#ffb100]">إضافة فيديو YouTube Shorts</h2>
            <input type="text" id="videoUrl" placeholder="رابط الفيديو (Shorts URL)" class="w-full bg-black border border-gray-700 rounded p-2 mb-3 text-white">
            <input type="text" id="videoTitle" placeholder="عنوان الفيديو" class="w-full bg-black border border-gray-700 rounded p-2 mb-4 text-white">
            <div class="flex gap-2">
                <button onclick="addVideo()" class="flex-1 bg-[#ffb100] text-black font-bold py-2 rounded">حفظ</button>
                <button onclick="toggleVideoModal()" class="flex-1 bg-gray-800 text-white py-2 rounded">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Planet -->
    <div class="planet-container">
        <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-[20deg] drop-shadow-[0_0_8px_rgba(14,165,233,0.3)]">
            <defs>
                <radialGradient id="planetGrad" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#38bdf8"/>
                    <stop offset="100%" stop-color="#0284c7"/>
                </radialGradient>
                <clipPath id="bottomHalf">
                    <rect x="0" y="50" width="100" height="50" />
                </clipPath>
            </defs>
            <ellipse cx="50" cy="50" rx="42" ry="7" fill="none" stroke="#ffb100" stroke-width="2.5" />
            <circle cx="50" cy="50" r="20" fill="url(#planetGrad)" />
            <ellipse cx="50" cy="50" rx="42" ry="7" fill="none" stroke="#ffb100" stroke-width="2.5" clip-path="url(#bottomHalf)" />
        </svg>
    </div>

    <!-- Stories Carousel -->
    <div class="stories-carousel">
        <button class="nav-arrow left" onclick="scrollShorts(-1)"><i class="fas fa-chevron-left"></i></button>
        <div class="stories-track" id="shortsTrack">
            <!-- Videos will be injected here -->
        </div>
        <button class="nav-arrow right" onclick="scrollShorts(1)"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Profile -->
    <div class="profile-wrapper">
        <img src="https://replicate.delivery/xezq/3f8V5BFyay3oAixnv2Cr9fltHIhvABk018Q3htPXGGn3xdUWA/out.png" class="profile-img" alt="Ahmed Profile">
        <div class="status-dot"></div>
    </div>

    <!-- Title -->
    <h1 class="main-title">AKEEL</h1>

    <!-- Action Buttons -->
    <div class="flex gap-4">
        <button class="action-btn">
            <i class="fab fa-facebook"></i>
            <span>Facebook</span>
        </button>
        <button class="action-btn">
            <i class="fab fa-github"></i>
            <span>GitHub</span>
        </button>
        <button class="action-btn">
            <i class="far fa-comment-alt"></i>
            <span>Forum</span>
        </button>
    </div>

    <!-- Theme Menu -->
    <div id="themeMenu" class="theme-menu">
        <div class="color-option" style="background: #ffb100;" onclick="changeTheme('#ffb100', 'radial-gradient(circle at 50% 50%, #4a2505 0%, #12090b 50%, #0a060a 100%)')"></div>
        <div class="color-option" style="background: #38bdf8;" onclick="changeTheme('#38bdf8', 'radial-gradient(circle at 50% 50%, #0c2b3a 0%, #050e14 50%, #02060a 100%)')"></div>
        <div class="color-option" style="background: #ef4444;" onclick="changeTheme('#ef4444', 'radial-gradient(circle at 50% 50%, #3d0a0a 0%, #140505 50%, #0a0202 100%)')"></div>
        <div class="color-option" style="background: #22c55e;" onclick="changeTheme('#22c55e', 'radial-gradient(circle at 50% 50%, #0a2e14 0%, #051408 50%, #020a04 100%)')"></div>
        <div class="color-option" style="background: #a855f7;" onclick="changeTheme('#a855f7', 'radial-gradient(circle at 50% 50%, #2e0a3d 0%, #14051a 50%, #0a0210 100%)')"></div>
        <div class="color-option" style="background: #f472b6;" onclick="changeTheme('#f472b6', 'radial-gradient(circle at 50% 50%, #3d0a25 0%, #1a0510 50%, #10020a 100%)')"></div>
    </div>

    <!-- Corners -->
    <button class="corner-btn bottom-left" title="Color options" onclick="toggleThemes(event)">
        <i class="fas fa-palette"></i>
    </button>

    <button class="corner-btn bottom-right">
        <i class="fas fa-cog"></i>
    </button>

</body>
</html>
